# Auto Content Publisher - 配置文件

database:
  path: "data/database.db"

crawler:
  interval: 120  # 采集间隔（分钟）
  timeout: 30
  retry_times: 3

ai:
  provider: "openai"
  api_key: "${AI_API_KEY}"
  model: "gpt-4"
  temperature: 0.7

wechat:
  app_id: "${WECHAT_APP_ID}"
  app_secret: "${WECHAT_APP_SECRET}"

scheduler:
  publish_times:
    - "08:00"
    - "12:00"
    - "20:00"

sources: []
