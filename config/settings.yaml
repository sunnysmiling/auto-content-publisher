# Auto Content Publisher - 配置中心

database:
  path: "data/database.db"

crawler:
  interval: 120
  timeout: 30
  retry_times: 3

ai:
  provider: "openai"
  api_key: "${AI_API_KEY}"
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 4000

wechat:
  app_id: "${WECHAT_APP_ID}"
  app_secret: "${WECHAT_APP_SECRET}"

scheduler:
  publish_times:
    - "08:00"
    - "12:00"
    - "20:00"

sources:
  - name: "36氪"
    url: "https://36kr.com/feed"
    type: "rss"
    enabled: true
    interval: 60

notify:
  dingtalk:
    enabled: false
    webhook: "${DINGTALK_WEBHOOK}"
