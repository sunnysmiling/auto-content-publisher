version: '3.8'

services:
  app:
    build: .
    container_name: auto-content-publisher
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/app/config/settings.yaml
      - DATABASE_PATH=/app/data/content.db
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 可选：Redis 缓存（用于大规模部署）
  # redis:
  #   image: redis:7-alpine
  #   container_name: acp-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

